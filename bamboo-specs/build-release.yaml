---
version: 2
plan:
  project-key: ADGEXT
  key: POPUPBLOCKRELEASESPECS
  name: popup blocker - build release

stages:
  - Build:
      manual: 'false'
      final: 'false'
      jobs:
        - Build

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: 'true'
    - checkout:
        repository: extensions-private
        path: private
        force-clean-build: 'true'
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            docker build \
              --file Dockerfile \
              --progress plain \
              --target build-release-output \
              --output type=local,dest=output \
              --build-context private=private \
              .
    - inject-variables:
        file: output/artifacts/build.txt
        scope: RESULT
        namespace: userscriptMeta
    - any-task:
        plugin-key: com.atlassian.bamboo.plugins.vcs:task.vcs.tagging
        configuration:
          selectedRepository: defaultRepository
          tagName: v${bamboo.userscriptMeta.version}-release
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh output/artifacts/userscript.tar.gz,output/artifacts/build.txt"
  artifacts:
    - name: userscript.tar.gz
      location: output/artifacts
      pattern: userscript.tar.gz
      shared: true
      required: true
    - name: build.txt
      location: output/artifacts
      pattern: build.txt
      shared: true
      required: true
  requirements:
    - extension: 'true'

triggers: []

branches:
  create: manually
  delete: never
  link-to-jira: 'true'

labels: []
other:
  concurrent-build-plugin: system-default
